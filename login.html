<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collect Tweak | Secure Access</title>
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Hacker Typography System -->
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#9048FD',
                        'brand-glow': 'rgba(144, 72, 253, 0.4)',
                        'core-bg': '#050505',
                        'card-bg': 'rgba(255, 255, 255, 0.02)',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        display: ['Bebas Neue', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        :root { --brand: #9048FD; }
        * { -webkit-font-smoothing: antialiased; }
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* ── CRT SCANLINES ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            animation: scanlines 8s linear infinite;
        }
        @keyframes scanlines {
            from { background-position: 0 0; }
            to   { background-position: 0 40px; }
        }

        /* ── GLASS & CARDS ── */
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            border-radius: 24px; 
            box-shadow: 0 20px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 15px rgba(144, 72, 253, 0.2);
            background: rgba(144, 72, 253, 0.02);
        }

        /* ── BUTTONS ── */
        .joly-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            overflow: hidden;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 700;
            transition: all 0.2s ease-out;
            cursor: pointer;
            border: none;
            color: white;
            z-index: 10;
            padding: 1rem 2rem;
            width: 100%;
        }

        .joly-glow {
            background: #9048FD;
            color: #ffffff;
            box-shadow: 0 8px 20px -5px rgba(144, 72, 253, 0.4); 
        }
        .joly-glow::before {
            content: "";
            position: absolute;
            inset: -2px;
            z-index: -1;
            border-radius: 0.85rem;
            background: #9048FD;
            opacity: 0.4;
            filter: blur(10px);
            transition: all 0.3s ease;
        }
        .joly-glow:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .joly-glow:hover::before { opacity: 0.8; filter: blur(15px); }

        .btn-social {
            background: #ffffff;
            color: #050505;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }
        .btn-social:hover {
            transform: translateY(-2px);
            background: #f0f0f0;
            box-shadow: 0 8px 25px rgba(255,255,255,0.2);
        }

        /* ── TYPOGRAPHY ── */
        .title-bebas {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.05em;
        }
        .mono-text {
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── WATERMARK & BACKGROUND ── */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 25vw;
            color: rgba(255,255,255,0.02);
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(144,72,253,0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Login entrance animation */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-login {
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">

    <!-- Cinematic Background layer -->
    <div class="watermark">TWEAK</div>
    <div class="ambient-glow"></div>
    <svg class="absolute inset-0 w-full h-full pointer-events-none select-none opacity-[0.04] mix-blend-overlay z-0" xmlns="http://www.w3.org/2000/svg">
        <filter id="noise"><feturbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"></feturbulence></filter>
        <rect width="100%" height="100%" filter="url(#noise)" fill="#000"></rect>
    </svg>

    <!-- UI LAYER -->
    <main class="relative z-10 w-full max-w-[420px] animate-login">
        
        <!-- Logo / Return Header -->
        <div class="flex flex-col items-center mb-8">
            <a href="index.html" class="flex items-center gap-2 text-white/50 hover:text-white transition-colors mb-6 text-sm font-mono tracking-widest uppercase">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Voltar
            </a>
            
            <div class="flex items-center justify-center mb-2">
                <div class="w-12 h-12 bg-brand/20 rounded-xl flex items-center justify-center border border-brand/40 shadow-[0_0_30px_rgba(144,72,253,0.3)]">
                    <i data-lucide="cpu" class="text-brand w-6 h-6"></i>
                </div>
            </div>
            <h1 class="title-bebas text-5xl md:text-6xl text-white">COLLECT <span class="text-brand italic">TWEAK</span></h1>
            <p class="mono-text text-brand text-[10px] tracking-[0.3em] font-bold mt-1 shadow-brand">SECURE ACCESS NODE</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card p-8 md:p-10 relative overflow-hidden">
            <!-- Subtle internal glow -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[2px] bg-gradient-to-r from-transparent via-brand to-transparent opacity-50"></div>

            <form class="flex flex-col gap-5 mt-2" id="loginForm">
                
                <!-- Email Input Group -->
                <div class="flex flex-col gap-2">
                    <label class="mono-text text-[10px] tracking-widest text-white/60 uppercase">Email ou Nome de Usuário</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="w-4 h-4 text-white/40"></i>
                        </div>
                        <input type="email" id="emailInput" placeholder="gamer@elite.com" required 
                            class="input-glass w-full py-3.5 pl-11 pr-4 rounded-xl text-sm font-medium w-full" />
                    </div>
                </div>

                <!-- Password Input Group -->
                <div class="flex flex-col gap-2 group">
                    <div class="flex justify-between items-end">
                        <label class="mono-text text-[10px] tracking-widest text-white/60 uppercase">Senha Criptografada</label>
                        <a href="#" class="text-[10px] text-brand hover:text-white transition-colors mono-text tracking-wider">Esqueceu?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-4 h-4 text-white/40"></i>
                        </div>
                        <input type="password" placeholder="••••••••••••" required 
                            class="input-glass w-full py-3.5 pl-11 pr-4 rounded-xl text-sm font-medium tracking-widest" />
                    </div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="joly-btn joly-glow mt-2">
                    <span class="mono-text tracking-widest uppercase text-sm">Autenticar Sistema</span>
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>

            </form>

            <div class="relative flex items-center py-6">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink-0 mx-4 text-white/30 text-xs font-mono uppercase tracking-widest">Database Linked</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <!-- Official Google Sign-In Button Container -->
            <div id="g_id_onload"
                data-client_id="939781324987-eq05lf6oj4t6a9nsk9l4idc4av7bjmfj.apps.googleusercontent.com"
                data-context="signin"
                data-callback="handleGoogleLogin"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                data-type="standard"
                data-shape="rectangular"
                data-theme="outline"
                data-text="signin_with"
                data-size="large"
                data-logo_alignment="left"
                data-width="340">
            </div>
            
            <div class="mt-8 text-center">
                <p class="text-white/40 text-xs font-medium">Ainda não possui otimização?</p>
                <a href="index.html#pricing" class="text-brand hover:text-white transition-colors text-sm font-bold tracking-wide uppercase mono-text mt-1 inline-block">Adquirir Licença</a>
            </div>

        </div>
    </main>

    <!-- Init Icons & Logic -->
    <script>
        lucide.createIcons();

        // ── DECODE JWT (from Google token) ──
        function decodeJwt(token) {
            try {
                const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(atob(base64));
            } catch(e) { return null; }
        }

        // ── GOOGLE OAUTH CALLBACK ──
        function handleGoogleLogin(response) {
            const payload = decodeJwt(response.credential);
            if (!payload) return alert('Erro ao processar login do Google.');

            const user = {
                email: payload.email,
                name: payload.name,
                avatar: payload.picture, // Real Google profile photo
                provider: 'google'
            };

            localStorage.setItem('collect_user', JSON.stringify(user));
            // Fixed: Redirecting to dashboard, not back to index
            window.location.href = 'dashboard.html';
        }

        // ── GOOGLE BUTTON LOGIC ──
        // The official button (g_id_signin) is handled automatically by the GSI library via data attributes.
        // No manual event listener is required for the standard button.

        // ── EMAIL LOGIN (Simulated - connect to backend later) ──
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const user = {
                email: email,
                name: email.split('@')[0],
                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(email)}`,
                provider: 'email'
            };
            localStorage.setItem('collect_user', JSON.stringify(user));
            // Fixed: Redirecting to dashboard node
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
